<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Utilizator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styleprofil.css">
    <style>
        /* ==========================================
           1. STILIZARE GENERALĂ
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fcfbfa; 
            min-height: 100vh;
        }

        /* ==========================================
           2. RECIPIENTUL PRINCIPAL (CARD-UL)
           ========================================== */
        .profile-container {
            position: relative;
            width: 800px;
            max-width: 90%;
            margin: 100px auto 50px auto; 
            opacity: 0; 
            animation: fadeUpIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .profile-title {
            font-size: 64px;
            font-weight: 900;
            color: #000;
            letter-spacing: 2px;
            position: absolute;
            top: -45px;
            left: 20px;
            z-index: 10;
        }

        .profile-card {
            background-color: #ffffff;
            padding: 80px 60px 40px 60px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 30px; /* Spațiu până la istoricul de jos */
        }

        /* ==========================================
           3. FORMULARUL DIN STÂNGA
           ========================================== */
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 25px; 
            width: 50%;
            margin-top: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 700;
            color: #a0a0a0;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .input-group input {
            border: none;
            border-bottom: 2px solid #eaeaea;
            padding: 5px 0 10px 0;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            outline: none;
            background: transparent;
        }

        .input-group input[readonly] {
            color: #555;
        }

        /* ==========================================
           4. POZA DE PROFIL DIN DREAPTA
           ========================================== */
        .avatar-section {
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .avatar-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            background-color: #f0f2f5; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.05);
        }

        .default-avatar-icon {
            font-size: 150px;
            color: #cfd6dc; 
        }

        .camera-btn {
            position: absolute;
            bottom: 10px;
            right: 25px;
            background-color: #ffffff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .camera-btn i { color: #333; font-size: 18px; }

        /* ==========================================
           5. BUTONUL DE ÎNAPOI
           ========================================== */
        .save-btn {
            position: absolute;
            bottom: -25px;
            right: 40px;
            background: linear-gradient(135deg, #ff8a76, #855525 );
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0px 10px 20px rgba(255, 75, 130, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0px 15px 25px rgba(255, 75, 130, 0.4);
        }

        /* ==========================================
           6. SECTIUNEA NOUĂ: ISTORIC PROGRAMĂRI
           ========================================== */
        .history-card {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.05);
        }

        .history-card h3 {
            font-size: 22px;
            font-weight: 800;
            color: #222;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px;
            background-color: #fdfdfd;
            border-left: 4px solid #855525; /* Accentul cafeniu din tema ta */
            border-radius: 0 6px 6px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .history-item i {
            font-size: 20px;
            color: #855525;
            margin-top: 3px;
        }

        .history-info h4 {
            font-size: 16px;
            color: #222;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .history-info .date-text {
            font-size: 13px;
            color: #777;
            font-weight: 500;
        }

        .history-info .details-text {
            font-size: 13px;
            color: #555;
            margin-top: 6px;
            font-style: italic;
            background-color: #f5f5f5;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .no-appointments {
            text-align: center;
            color: #a0a0a0;
            font-size: 15px;
            padding: 20px 0;
        }
        
        @keyframes fadeUpIn {
            0% { opacity: 0; transform: translateY(60px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <nav class="navbar">
            <a href="#" class="nav-logo">
                <span class="logo-icon"><img src="logo.jpeg" alt="SnapTech" style="height: 88px; width: auto;"></span>
                
            </a>

            <ul class="nav-links">
                <li><a href="home.html">Servicii</a></li>
                <li><a href="home.html#about">De ce SnapTech</a></li>
                <li><a href="home.html#service-container">Preturi</a></li>
                <li><a href="home.html#resources">Resurse</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <div class="nav-actions">
                <a href="login.html" class="btn btn-solid">Sign up or Login</a>
            </div>
        </nav>
    </header>

    <div class="profile-container">
        <h1 class="profile-title">Profil</h1>
        
        <div class="profile-card">
            <div class="form-section">
                <div class="input-group">
                    <label>NUME UTILIZATOR</label>
                    <input type="text" id="displayUsername" readonly>
                </div>

                <div class="input-group">
                    <label>E-MAIL</label>
                    <input type="email" id="displayEmail" readonly>
                </div>
                
                <div class="input-group">
                    <label>PAROLA</label>
                    <input type="password" value="*****************" readonly>
                </div>
            </div>

            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <i class="fas fa-user-circle default-avatar-icon"></i>
                    <button class="camera-btn"><i class="fas fa-camera"></i></button>
                </div>
            </div>

            <button class="save-btn" onclick="mergiInapoi()">ÎNAPOI</button>
        </div>

        <div class="history-card">
            <h3>Istoric Conferințe & Programări</h3>
            <div id="listaProgramari" class="history-list">
                <p class="no-appointments">Se încarcă istoricul programărilor...</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            const navActions = document.querySelector('.nav-actions');
            
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const usernameReal = payload.username;
                    const emailReal = payload.email;
                    
                    document.getElementById('displayUsername').value = usernameReal;
                    document.getElementById('displayEmail').value = emailReal; 

                    navActions.innerHTML = `
                        <div class="user-profile" style="display: flex; align-items: center; gap: 20px;">
                            <a href="profil.html" style="text-decoration: none; color: #222222; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 16px;">
                                <i class="fas fa-user-circle" style="font-size: 26px; color: #855525;"></i>
                                Salut, ${usernameReal}!
                            </a>
                            <button onclick="logout()" class="btn btn-outline" style="padding: 8px 16px; font-size: 14px; cursor: pointer; border: 1px solid #855525; color: #855525; background: transparent; border-radius: 4px;">Deconectare</button>
                        </div>
                    `;

                    // CHEMĂM FUNCȚIA NOUĂ PENTRU A ÎNCĂRCA ISTORICUL UTILIZATORULUI LOGAT
                    incarcaIstoricProgramari(emailReal);

                } catch(error) {
                    console.error("Eroare la citirea profilului:", error);
                }
            } else {
                window.location.href = 'login.html';
            }
        });

       // ==========================================
        // FUNCȚIE NOUĂ: FETCH CĂTRE SERVER PENTRU DATE
        // ==========================================
        async function incarcaIstoricProgramari(email) {
            const containerLista = document.getElementById('listaProgramari');
            
            try {
                const response = await fetch('http://localhost:3000/istoric-programari', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const date = await response.json();

                if (response.ok && date.programari.length > 0) {
                    containerLista.innerHTML = ''; // Curățăm mesajul de încărcare

                    // Luăm timpul exact de acum, în milisecunde
                    const timpulCurent = new Date().getTime();

                    date.programari.forEach(p => {
                        const dataProgramare = new Date(p.data_actiune);
                        const timpulProgramarii = dataProgramare.getTime();

                        // Formatăm data elegant în format românesc
                        const dataRo = dataProgramare.toLocaleString('ro-RO', {
                            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                        });

                        // Verificăm dacă există detalii scrise de utilizator
                        const detaliiHtml = p.detalii_suplimentare 
                            ? `<div class="details-text"><b>Mențiuni:</b> "${p.detalii_suplimentare}"</div>` 
                            : '';

                        // ==========================================
                        // LOGICA DE STARE (TRECUT VS VIITOR)
                        // ==========================================
                        let iconitaHtml = '';
                        let stilExtra = ''; // Pentru a le "stinge" puțin pe cele trecute

                        if (timpulProgramarii < timpulCurent) {
                            // A TRECUT: Iconiță de Check Verde + Opacitate redusă
                            iconitaHtml = '<i class="fas fa-check-circle" style="color: #2e7d32; font-size: 22px; margin-top: 2px;" title="Finalizată"></i>';
                            stilExtra = 'opacity: 0.65; background-color: #f5f5f5; border-left-color: #9e9e9e;'; 
                        } else {
                            // URMEAZĂ: Iconiță de Ceas Cafenie (În așteptare)
                            iconitaHtml = '<i class="fas fa-clock" style="color: #855525; font-size: 22px; margin-top: 2px;" title="Urmează"></i>';
                            stilExtra = 'opacity: 1;'; // Rămâne la vizibilitate maximă
                        }

                        // Construim elementul din listă aplicând logica de mai sus
                        const itemHtml = `
                            <div class="history-item" style="${stilExtra}">
                                ${iconitaHtml}
                                <div class="history-info">
                                    <h4>${p.tip_eveniment}</h4>
                                    <div class="date-text">${dataRo}</div>
                                    ${detaliiHtml}
                                </div>
                            </div>
                        `;
                        containerLista.innerHTML += itemHtml;
                    });
                } else {
                    containerLista.innerHTML = `<p class="no-appointments">Nu aveți nicio programare înregistrată în acest moment.</p>`;
                }
            } catch (error) {
                console.error("Eroare fetch istoric:", error);
                containerLista.innerHTML = `<p class="no-appointments" style="color: red;">Nu s-a putut încărca istoricul programărilor.</p>`;
            }
        }
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('userEmail'); 
            window.location.href = 'login.html';
        }

        function mergiInapoi() {
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
