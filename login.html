<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loginstyle.css">
    <title>ProtoBot</title>
</head>

<body>
    <div class="wrapper">
        <div class="form-container sign-up">
            <form id="signupForm">
                <h2>sign up</h2>
                <div class="form-group">
                    <input type="text" id="signupUsername" required> <i class="fas fa-user"></i>
                    <label for="">nume utilizator</label>
                </div>
                <div class="form-group">
                    <input type="email" id="signupEmail" required>
                    <i class="fas fa-at"></i>
                    <label for="">email</label>
                </div>
                <div class="form-group">
                    <input type="password" id="signupPassword" required>
                    <i class="fas fa-lock"></i>
                    <label for="">parola</label>
                </div>
                <div class="form-group">
                    <input type="password" id="confirmPassword" required>
                    <i class="fas fa-lock"></i>
                    <label for="">confirm parola</label>
                </div>
                <button type="submit" class="btn">sign up</button>
                <div class="link">
                    <p>Ai cont deja?<a href="#" class="signin-link"> sign in</a></p>
                </div>
            </form>
        </div>

        <div class="form-container sign-in">
            <form id="loginForm">
                <h2>login</h2>
                <div class="form-group">
                    <input type="email" id="loginEmail" required>
                    <i class="fas fa-at"></i>
                    <label for="">email</label>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" required>
                    <i class="fas fa-lock"></i>
                    <label for="">parola</label>
                </div>
                <div class="forgot-pass">
                    <a href="#">ai uitat parola?</a>
                </div>
                <button type="submit" class="btn">login</button>
                <div class="link">
                    <p>Nu ai cont inca?<a href="#" class="signup-link"> sign up</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/9e5ba2e3f5.js" crossorigin="anonymous"></script>

    <script>
        // ==========================================
        // 1. ANIMAȚIILE PENTRU SWITCH (CODUL TĂU)
        // ==========================================
        let wrapper = document.querySelector('.wrapper'),
            signUpLink = document.querySelector('.link .signup-link'),
            signInLink = document.querySelector('.link .signin-link');

        signUpLink.addEventListener('click', () => {
            wrapper.classList.add('animated-signin');
            wrapper.classList.remove('animated-signup');
        });

        signInLink.addEventListener('click', () => {
            wrapper.classList.add('animated-signup');
            wrapper.classList.remove('animated-signin');
        });

        // ==========================================
        // 2. CONEXIUNEA CU SERVERUL (SIGN UP)
        // ==========================================
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Oprește reîncărcarea paginii

            // 1. AICI EXTRAGEM USERNAME-UL DIN HTML:
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const parola = document.getElementById('signupPassword').value;
            const confirmare = document.getElementById('confirmPassword').value;

            // Verificare frontend: Parolele sunt identice?
            if (parola !== confirmare) {
                alert('Parolele nu se potrivesc!');
                return; // Oprește execuția
            }

            try {
                const response = await fetch('http://localhost:3000/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    
                    // 2. AICI ESTE LINIA CU BODY MODIFICATĂ:
                    body: JSON.stringify({ email: email, parola: parola, username: username })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message); // Cont creat cu succes!
                    document.getElementById('signupForm').reset(); // Curățăm formularul
                    signInLink.click(); // Îl trimitem automat pe panoul de Login
                } else {
                    alert(data.message); // Ex: Email deja existent
                }
            } catch (error) {
                console.error(error);
                alert('Eroare de conexiune la server!');
            }
        });

        // ==========================================
        // 3. CONEXIUNEA CU SERVERUL (LOGIN)
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const parola = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, parola: parola })
                });

                const data = await response.json();

                if (response.ok) {
                    // Logare reușită! Salvăm biletul de acces (token) în memoria browserului
                    localStorage.setItem('authToken', data.token);

                    // Îl redirecționăm către pagina principală cu formularul de programare
                    window.location.href = 'home.html';
                } else {
                    alert(data.message); // Ex: Email sau parolă incorecte
                }
            } catch (error) {
                console.error(error);
                alert('Eroare de conexiune la server!');
            }
        });

        if (response.ok) {
            // Salvăm token-ul și email-ul în memoria browserului
            localStorage.setItem('authToken', data.token);
            localStorage.setItem('userEmail', data.email);

            // Îl redirecționăm către pagina principală
            window.location.href = 'home.html';
        }
    </script>
</body>

</html>
